<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具箱</title>
    <style>
        /* 通用样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        html, body {
           height: 100%;
           overflow: hidden;
        }

        /* 整体容器 */
        .container {
            display: flex;
            height: 100%;
        }

        /* 左侧导航栏，变窄 */
        .sidebar {
            width: 160px;
            background-color: #2c3e50;
            color: white;
            position: fixed;
            height: 100%;
            padding-top: 20px;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar ul li {
            margin: 20px 0;
        }

        .sidebar ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            display: block;
            padding: 8px 20px;
            transition: background-color 0.3s;
        }

        .sidebar ul li a:hover {
            background-color: #34495e;
        }

        /* 右侧内容区 */
        .content {
            margin-left: 160px;
            padding: 10px;
            width: calc(100% - 160px);
            overflow-y: auto;
            height: 100%;
        }

        /* 标题样式 */
        h2 {
            font-size: 24px;
            color: white;
            background-color: #e74c3c;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: left;
            margin-left: 0px;
            margin-right: 10px;
            width: calc(100%);
        }

        h3 {
            margin-top: 10px;
            margin-bottom: 10px;
        }
        /* 按钮样式 */
        .box {
            text-decoration: none;
            color: black;
            line-height: 1.5;
            width: 200px;
            height: 75px;
            padding: 10px;
            display: flex;
            justify-content: center;
            background-color: #fff;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s, box-shadow 0.3s;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-size: 15px;
            margin: 10px 0;
            flex-direction: column;
        }

        .box:hover {
            background-color: #e0e0e0;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }

        .box:active {
            transform: scale(0.98);
        }

        /* 第一行文字样式 */
        .line1 {
            font-weight: 700;
        }

        /* 第二行文字样式 */
        .line2 {
            font-weight: 300;
        }

        /* 每个section的样式 */
        section {
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        details {
          margin-bottom: 10px;
          display: none;
        }

        summary {
          cursor: pointer;
          padding: 10px;
          background-color: #4CAF50;
          color: white;
          font-size: 16px;
        }

        .selection-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .selection-item {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid #333;
            border-radius: 5px;
            background-color: #f5f5f5;
            transition: background-color 0.3s;
        }
        .selection-item:hover {
            background-color: #e0e0e0;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .box {
                width: 150px;
                font-size: 14px;
            }
            .sidebar {
                display: none;
                flex-direction: column;
                position: fixed;
                top: 0;
                left: 0;
                width: 180px;
                height: 100%;
                padding-top: 20px;
            }

            .content {
                margin-left: 0;
                padding-left: 5;
                width: 100%;
            }

            .sidebar.open {
                display: flex;
            }

            .sidebar ul li {
                margin: 10px 0;
            }

            .sidebar ul li a {
                padding: 10px 15px;
                font-size: 16px;
            }
            .content details {
                display: block ;
            }
        }
    </style>
    <script>
        (function() {
            var script = document.createElement('script');
            var currentUrl = window.location.href;
            if (currentUrl.indexOf('https://yintengyue.github.io') === -1) {
                script.src = 'isallow.js';
            } else {
                script.src = 'https://huzhonghe2011.github.io/isallow.js';
            }
            document.head.appendChild(script);
        })();
    </script>
</head>
<body>
    <script src="securityMode.js"></script>
    <script src="hair.js"></script>
    <div class="container">
        <!-- 左侧导航栏（动态生成） -->
        <nav class="sidebar" id="sidebar">
            <ul id="nav-list"></ul>
        </nav>

        <!-- 右侧内容区 -->
        <div class="content">
            <!-- 折叠导航栏（动态生成） -->
            <details id="mobile-nav-details">
                <summary>点击展开/折叠导航栏</summary>
                <div id="mobile-nav-list"></div>
            </details>

            <!-- 动态 section 容器（section1~section5 将在此动态生成） -->
            <div id="dynamic-sections"></div>

            <!-- section6 固定不变 -->
            <section id="section6">
                <h2>网站设置</h2>
                <h3>选择标题</h3>
                <div class="selection-container">
                    <div class="selection-item" onclick="changeTitle('工具箱')">工具箱</div>
                    <div class="selection-item" onclick="changeTitle('百度一下，你就知道')">百度一下，你就知道</div>
                </div>

                <h3>安全模式</h3>
                <label for="security-mode">
                    <input type="checkbox" id="security-mode"> 启用极域安全模式 (启用后，离开网页时会自动变为该网页已被阻止，长按1秒后恢复，更改选择需要刷新网页)
                </label>
            </section>
            <p id="days">本网站已运营 *** 天</p>
        </div>
    </div>
    <script>
        // 平滑滚动函数
        function setupSmoothScroll() {
            document.querySelectorAll('.sidebar a, #mobile-nav-list a').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    if (targetId && targetId.startsWith('#')) {
                        document.querySelector(targetId).scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
        }

        // 计算网站运营天数
        function calculateDays(startDate) {
            const today = new Date();
            const start = new Date(startDate);
            const difference = today - start;
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            return days;
        }
        
        const startDate = '2024-09-13';
        const days = calculateDays(startDate);
        document.getElementById('days').textContent = `本网站已运营 ${days} 天`;

        // 更改页面标题的函数
        function changeTitle(title) {
            document.title = title;
        }

        // 动态加载 JSON 并渲染整个页面
        async function loadAndRender() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('无法加载 data.json');
                const data = await response.json();

                // 1. 渲染左侧导航栏
                const navList = document.getElementById('nav-list');
                data.navItems.forEach(item => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = `#${item.targetId}`;
                    a.textContent = item.text;
                    li.appendChild(a);
                    navList.appendChild(li);
                });

                // 2. 渲染移动端折叠导航栏
                const mobileNavDiv = document.getElementById('mobile-nav-list');
                data.navItems.forEach(item => {
                    const a = document.createElement('a');
                    a.href = `#${item.targetId}`;
                    a.textContent = item.text;
                    // 为了样式，可以包装在 li 中（可选），这里简单加个换行
                    const p = document.createElement('p');
                    p.appendChild(a);
                    mobileNavDiv.appendChild(p);
                });

                // 3. 渲染动态 sections (section1~section5)
                const dynamicSections = document.getElementById('dynamic-sections');
                data.sections.forEach(sectionData => {
                    const section = document.createElement('section');
                    section.id = sectionData.id;

                    // 添加 h2 标题
                    const h2 = document.createElement('h2');
                    h2.textContent = sectionData.title;
                    section.appendChild(h2);

                    // 遍历 groups 构建内容
                    sectionData.groups.forEach(group => {
                        if (group.groupTitle) {
                            const h3 = document.createElement('h3');
                            h3.textContent = group.groupTitle;
                            section.appendChild(h3);
                        }

                        const buttonsDiv = document.createElement('div');
                        buttonsDiv.className = 'buttons';

                        group.buttons.forEach(btn => {
                            const a = document.createElement('a');
                            a.href = btn.link;
                            a.className = 'box';

                            const p1 = document.createElement('p');
                            p1.className = 'line1';
                            p1.textContent = btn.line1;

                            const p2 = document.createElement('p');
                            p2.className = 'line2';
                            p2.textContent = btn.line2;

                            a.appendChild(p1);
                            a.appendChild(p2);
                            buttonsDiv.appendChild(a);
                        });

                        section.appendChild(buttonsDiv);
                    });

                    dynamicSections.appendChild(section);
                });

                // 4. 重新绑定平滑滚动事件（因为新生成的链接需要监听）
                setupSmoothScroll();

            } catch (error) {
                console.error('渲染失败:', error);
                // 可显示错误提示，但为了简洁，静默失败
            }
        }

        // 页面加载完成后执行
        window.addEventListener('DOMContentLoaded', loadAndRender);
    </script>
</body>
</html>
