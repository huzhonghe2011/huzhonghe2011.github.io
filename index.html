<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具箱</title>
    <style>
        /* ===== 基础重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        /* ===== 整体容器 ===== */
        .container {
            display: flex;
            height: 100%;
        }

        /* ===== 左侧导航栏 ===== */
        .sidebar {
            width: 160px;
            background-color: #2c3e50;
            color: white;
            position: fixed;
            height: 100%;
            padding-top: 20px;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar ul li {
            margin: 20px 0;
        }

        .sidebar ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            display: block;
            padding: 8px 20px;
            transition: background-color 0.3s;
        }

        .sidebar ul li a:hover {
            background-color: #34495e;
        }

        /* ===== 右侧内容区 ===== */
        .content {
            margin-left: 160px;
            padding: 10px;
            width: calc(100% - 160px);
            overflow-y: auto;
            height: 100%;
        }

        /* 标题样式 */
        h2 {
            font-size: 24px;
            color: white;
            background-color: #e74c3c;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: left;
            margin-left: 0;
            margin-right: 10px;
            width: calc(100%);
        }

        h3 {
            margin-top: 10px;
            margin-bottom: 10px;
        }

        /* 按钮样式 */
        .box {
            text-decoration: none;
            color: black;
            line-height: 1.5;
            width: 200px;
            height: 75px;
            padding: 10px;
            display: flex;
            justify-content: center;
            background-color: #fff;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s, box-shadow 0.3s;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            font-size: 15px;
            margin: 10px 0;
            flex-direction: column;
        }

        .box:hover {
            background-color: #e0e0e0;
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }

        .box:active {
            transform: scale(0.98);
        }

        .line1 {
            font-weight: 700;
        }

        .line2 {
            font-weight: 300;
        }

        section {
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        details {
            margin-bottom: 10px;
            display: none;
        }

        summary {
            cursor: pointer;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
        }

        /* 加载中提示 */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }

        /* 默认隐藏 section6（网站设置）和 section1（机房必备） */
        #section1,
        #section6 {
            display: none;
        }

        /* 选择器容器（网站设置内） */
        .selection-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .selection-item {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border: 2px solid #333;
            border-radius: 5px;
            background-color: #f5f5f5;
            transition: background-color 0.3s;
        }
        .selection-item:hover {
            background-color: #e0e0e0;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .box {
                width: 150px;
                font-size: 14px;
            }
            .sidebar {
                display: none;
                flex-direction: column;
                position: fixed;
                top: 0;
                left: 0;
                width: 180px;
                height: 100%;
                padding-top: 20px;
            }
            .content {
                margin-left: 0;
                padding-left: 5px;
                width: 100%;
            }
            .sidebar.open {
                display: flex;
            }
            .sidebar ul li {
                margin: 10px 0;
            }
            .sidebar ul li a {
                padding: 10px 15px;
                font-size: 16px;
            }
            .content details {
                display: block;
            }
        }
    </style>
    <!-- 外部脚本（原样保留） -->
    <script>
        (function() {
            var script = document.createElement('script');
            var currentUrl = window.location.href;
            if (currentUrl.indexOf('https://yintengyue.github.io') === -1) {
                script.src = 'isallow.js';
            } else {
                script.src = 'https://huzhonghe2011.github.io/isallow.js';
            }
            document.head.appendChild(script);
        })();
    </script>
</head>
<body>
    <script src="securityMode.js"></script>
    <script src="hair.js"></script>
    <div class="container">
        <!-- 左侧导航栏（动态生成） -->
        <nav class="sidebar" id="sidebar">
            <ul id="nav-list"></ul>
        </nav>

        <!-- 右侧内容区 -->
        <div class="content">
            <!-- 移动端折叠导航栏（动态生成） -->
            <details id="mobile-nav-details">
                <summary>点击展开/折叠导航栏</summary>
                <div id="mobile-nav-list"></div>
            </details>

            <!-- 动态生成的 section1~section5 将放在这里 -->
            <div id="dynamic-sections">
                <div class="loading">加载中...</div>
            </div>

            <!-- section6 固定不变（默认隐藏） -->
            <section id="section6">
                <h2>网站设置</h2>
                <h3>选择标题</h3>
                <div class="selection-container">
                    <div class="selection-item" onclick="changeTitle('工具箱')">工具箱</div>
                    <div class="selection-item" onclick="changeTitle('百度一下，你就知道')">百度一下，你就知道</div>
                    <div class="selection-item" onclick="changeTitle('工具箱Pro Max Ultra Turbo Hyper Mega Grand Advanced Giant Massive Prime Supreme Ultimate Apex Pinnacle Expert Master+')">工具箱Pro Max Ultra Turbo Hyper Mega Grand Advanced Giant Massive Prime Supreme Ultimate Apex Pinnacle Expert Master+</div>
                </div>

                <h3>安全模式</h3>
                <label for="security-mode">
                    <input type="checkbox" id="security-mode"> 启用极域安全模式 (启用后，离开网页时会自动变为该网页已被阻止，长按1秒后恢复，更改选择需要刷新网页)
                </label>
            </section>
            <p id="days">本网站已运营 *** 天</p>
        </div>
    </div>

    <script>
        // ===== 全局变量 =====
        let seeallEntered = false;          // 是否已解锁隐藏区域
        let inputBuffer = '';               // 密码输入缓冲区
        const targetPassword = 'seeall';     // 触发密码
        const hiddenSectionIds = ['section1', 'section6']; // 默认隐藏的模块ID
        let fullNavItems = [];               // 存储完整的导航项（从JSON加载）

        // ===== 键盘监听：检测 "seeall" 输入（忽略输入框）=====
        document.addEventListener('keydown', function(e) {
            // 如果焦点在输入框、文本域或可编辑元素中，不处理
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) {
                return;
            }
            // 只处理字符键
            if (e.key.length === 1) {
                inputBuffer += e.key.toLowerCase();
                if (inputBuffer.length > targetPassword.length) {
                    inputBuffer = inputBuffer.slice(-targetPassword.length);
                }
                if (inputBuffer === targetPassword) {
                    seeallEntered = true;
                    // 显示隐藏的 sections
                    hiddenSectionIds.forEach(id => {
                        const section = document.getElementById(id);
                        if (section) section.style.display = 'block';
                    });

                    // 重新渲染导航栏（显示隐藏的菜单项）
                    renderNavbar(true);
                    inputBuffer = ''; // 清空缓冲区
                }
            }
        });

        // ===== 平滑滚动函数 =====
        function setupSmoothScroll() {
            document.querySelectorAll('.sidebar a, #mobile-nav-list a').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    if (targetId && targetId.startsWith('#')) {
                        document.querySelector(targetId).scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
        }

        // ===== 渲染导航栏（根据 showAll 决定是否显示隐藏项）=====
        function renderNavbar(showAll) {
            const navList = document.getElementById('nav-list');
            const mobileNavDiv = document.getElementById('mobile-nav-list');
            if (!navList || !mobileNavDiv) return;

            // 清空现有内容
            navList.innerHTML = '';
            mobileNavDiv.innerHTML = '';

            // 遍历完整导航项
            fullNavItems.forEach(item => {
                // 如果该项对应的 section 是隐藏项且 showAll 为 false，则跳过
                if (!showAll && hiddenSectionIds.includes(item.targetId)) {
                    return;
                }
                // 左侧导航
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = `#${item.targetId}`;
                a.textContent = item.text;
                li.appendChild(a);
                navList.appendChild(li);

                // 移动端导航（简单用 p 包裹）
                const p = document.createElement('p');
                const mobileA = document.createElement('a');
                mobileA.href = `#${item.targetId}`;
                mobileA.textContent = item.text;
                p.appendChild(mobileA);
                mobileNavDiv.appendChild(p);
            });

            // 重新绑定平滑滚动
            setupSmoothScroll();
        }

        // ===== 计算网站运营天数 =====
        function calculateDays(startDate) {
            const today = new Date();
            const start = new Date(startDate);
            const difference = today - start;
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            return days;
        }
        
        const startDate = '2024-09-13';
        const days = calculateDays(startDate);
        document.getElementById('days').textContent = `本网站已运营 ${days} 天`;

        // ===== 更改页面标题 =====
        function changeTitle(title) {
            document.title = title;
        }

        // ===== 动态加载 JSON 并渲染整个页面 =====
        async function loadAndRender() {
            const dynamicSections = document.getElementById('dynamic-sections');
            // 显示加载中
            dynamicSections.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('无法加载 data.json');
                const data = await response.json();

                // 保存完整的导航项供后续使用
                fullNavItems = data.navItems || [];

                // 清空动态区域，准备生成 sections
                dynamicSections.innerHTML = '';

                // 生成 sections
                data.sections.forEach(sectionData => {
                    const section = document.createElement('section');
                    section.id = sectionData.id;

                    // 添加 h2 标题
                    const h2 = document.createElement('h2');
                    h2.textContent = sectionData.title;
                    section.appendChild(h2);

                    // 遍历 groups 构建内容
                    sectionData.groups.forEach(group => {
                        if (group.groupTitle) {
                            const h3 = document.createElement('h3');
                            h3.textContent = group.groupTitle;
                            section.appendChild(h3);
                        }

                        const buttonsDiv = document.createElement('div');
                        buttonsDiv.className = 'buttons';

                        group.buttons.forEach(btn => {
                            const a = document.createElement('a');
                            a.href = btn.link;
                            a.className = 'box';

                            const p1 = document.createElement('p');
                            p1.className = 'line1';
                            p1.textContent = btn.line1;

                            const p2 = document.createElement('p');
                            p2.className = 'line2';
                            p2.textContent = btn.line2;

                            a.appendChild(p1);
                            a.appendChild(p2);
                            buttonsDiv.appendChild(a);
                        });

                        section.appendChild(buttonsDiv);
                    });

                    // 如果是隐藏模块且密码未输入，保持隐藏（CSS 已处理，但以防万一再设置一次）
                    if (!seeallEntered && hiddenSectionIds.includes(section.id)) {
                        section.style.display = 'none';
                    }

                    dynamicSections.appendChild(section);
                });

                // 初始渲染导航栏（不显示隐藏项）
                renderNavbar(false);

            } catch (error) {
                console.error('渲染失败:', error);
                dynamicSections.innerHTML = '<div class="loading">加载失败，请刷新页面重试。</div>';
            }
        }

        // 页面加载完成后执行
        window.addEventListener('DOMContentLoaded', loadAndRender);
    </script>
</body>
</html>
