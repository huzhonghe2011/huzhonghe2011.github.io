<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜方块 V2 · 经典样式</title>
    <style>
        /* ========== 完全采用 V1.1 的样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a2a3a, #2c3e50);
            color: #ecf0f1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        
        .container {
            background: rgba(30, 40, 60, 0.85);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            padding: 25px;
            width: 100%;
            max-width: 700px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid #4a5568;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #3498db, #2ecc71, #e74c3c, #f39c12, #9b59b6);
        }
        
        h1 {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-size: 2.4rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
            margin-bottom: 15px;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #3498db, #2ecc71);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #a0aec0;
            margin-bottom: 20px;
        }
        
        #info {
            background: rgba(26, 32, 44, 0.7);
            border-radius: 10px;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #2d3748;
            font-size: 1rem;
        }
        
        #info a {
            color: #64b5f6;
            text-decoration: none;
            transition: all 0.3s;
            background: rgba(100, 181, 246, 0.1);
            padding: 4px 8px;
            border-radius: 5px;
            margin-left: 5px;
        }
        
        #info a:hover {
            text-decoration: underline;
            background: rgba(100, 181, 246, 0.3);
        }
        
        .content-box {
            background: rgba(26, 32, 44, 0.7);
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
            border: 1px solid #2d3748;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.3);
        }
        
        #loading {
            font-size: 1.2rem;
            padding: 15px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            margin: 15px auto;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .question {
            font-size: 1.6rem;
            font-weight: bold;
            margin: 20px 0;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }
        
        .btn {
            padding: 14px 28px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
            min-width: 120px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        #yesButton {
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
            color: white;
        }
        
        #noButton {
            background: linear-gradient(to bottom, #e74c3c, #c0392b);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        #result {
            font-size: 1.8rem;
            margin: 25px 0;
            padding: 18px;
            background: rgba(40, 50, 70, 0.7);
            border-radius: 10px;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            border-left: none;
        }
        
        .result-title {
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .result-content {
            font-size: 1.8rem;
            padding: 10px;
            text-align: center;
        }
        
        .footer {
            margin-top: 15px;
            color: #718096;
            font-size: 0.85rem;
        }
        
        .hidden {
            display: none;
        }
        
        #restartButton {
            background: linear-gradient(to bottom, #f39c12, #e67e22) !important;
            color: white;
            margin-top: 20px;
        }
        
        .result-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .question {
                font-size: 1.3rem;
            }
            
            .btn {
                padding: 12px 25px;
                font-size: 1.1rem;
                min-width: 100px;
            }
            
            .btn-container {
                gap: 15px;
            }
            
            .container {
                padding: 20px;
                min-height: 450px;
            }
            
            .result-title {
                font-size: 1.5rem;
            }
            
            .result-content {
                font-size: 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }
            
            .question {
                font-size: 1.1rem;
            }
            
            .btn-container {
                flex-direction: row;
                gap: 10px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .btn {
                width: auto;
                padding: 10px 20px;
                font-size: 1rem;
            }
            
            .container {
                min-height: 400px;
            }
            
            .result-title {
                font-size: 1.3rem;
            }
            
            .result-content {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>猜方块 V2</h1>
        <div class="subtitle">终极版 · 以Java版特性为参考</div>

        <!-- 信息栏：显示方块数量 (V1.1风格) 初始隐藏 -->
        <div id="info" class="hidden"></div>

        <!-- 加载动画 (V1.1风格) -->
        <div id="loading">
            <div class="spinner"></div>
            正在加载方块数据...
        </div>

        <!-- 游戏主容器 (初始隐藏) 结构与V1.1保持一致 -->
        <div id="gameContainer" class="hidden">
            <div class="content-box">
                <div id="questionContainer" class="question"></div>
            </div>

            <div class="btn-container">
                <!-- 按钮ID保持与V1.1一致，但调用V2的answer函数 -->
                <button id="yesButton" class="btn" onclick="answer(true)">是</button>
                <button id="noButton" class="btn" onclick="answer(false)">否</button>
            </div>

            <!-- 结果显示区 (V1.1样式) -->
            <div id="result" class="result hidden"></div>

            <!-- 重启按钮 (预先放置，隐藏，与V1.1风格匹配) -->
            <button id="restartButton" class="btn hidden" onclick="restart()">再来一次</button>
        </div>
    </div>

    <script>
        // ========== 完全保留 V2 的逻辑，仅适配 V1.1 的 DOM 结构和样式 ==========
        let blocks = [];
        let questions = [];
        let candidates = [];
        let askedQuestions = [];
        let currentQuestion = null;

        // 加载 blocks.json (V2 数据源)
        async function loadData() {
            try {
                const res = await fetch("blocks.json");
                blocks = await res.json();
                buildQuestions();
                // 更新info栏 (V1.1风格)
                const infoDiv = document.getElementById("info");
                // 保留链接样式
                infoDiv.innerHTML = `已加入 <b>${blocks.length}</b> 个方块 <a href="view.html">查看所有方块</a>`;
                infoDiv.classList.remove("hidden");

                // 隐藏loading，显示游戏容器
                document.getElementById("loading").classList.add("hidden");
                document.getElementById("gameContainer").classList.remove("hidden");

                startGame();
            } catch (error) {
                console.error("加载blocks.json失败:", error);
                document.getElementById("loading").innerHTML = '<div class="error">数据加载失败，请刷新重试</div>';
            }
        }

        // 构建问题库 (V2 完整列表)
        function buildQuestions() {
            questions = [
                { key: "natural", text: "是否自然生成？" },
                { key: "dimension:overworld", text: "是否在主世界生成？" },
                { key: "dimension:nether", text: "是否在下界生成？" },
                { key: "dimension:end", text: "是否在末地生成？" },
                { key: "craftedOnly", text: "是否只能通过合成获得？" },
                { key: "commandOnly", text: "是否只能通过指令获得？" },

                { key: "fullBlock", text: "是否为完整立方体？" },
                { key: "transparent", text: "是否为透明方块？" },
                { key: "luminous", text: "是否会发光？" },
                { key: "gravity", text: "是否受重力影响？" },
                { key: "pushable", text: "是否可被活塞推动？" },

                { key: "type:stone", text: "是否属于石质类？" },
                { key: "type:dirt", text: "是否属于泥土类？" },
                { key: "type:ore", text: "是否属于矿物类？" },
                { key: "type:plant", text: "是否属于植物类？" },
                { key: "type:wood", text: "是否属于木质类？" },
                { key: "type:metal", text: "是否属于金属类？" },

                { key: "interactable", text: "是否具有交互功能？" },
                { key: "hasGUI", text: "是否会打开界面？" },
                { key: "container", text: "是否可以存储物品？" },
                { key: "redstone", text: "是否与红石相关？" },
                { key: "lightSource", text: "是否属于照明类？" },

                { key: "plantable", text: "是否需要种植？" },
                { key: "needsWater", text: "是否需要水源？" },
                { key: "needsSand", text: "是否只能种在沙子上？" },
                { key: "causesDamage", text: "是否会造成伤害？" },
                { key: "boneMeal", text: "是否可以被骨粉催熟？" },
                
                { key: "requiresSilkTouch", text: "是否需要精准采集？" },
                { key: "burnable", text: "是否可以被火烧毁？" },
                { key: "explosionProof", text: "是否抗爆炸？" }
            ];
        }

        // 开始新游戏 (重置状态)
        function startGame() {
            candidates = [...blocks];
            askedQuestions = [];

            // 确保界面元素正确显示/隐藏 (V1.1风格)
            document.getElementById("result").classList.add("hidden");
            document.getElementById("restartButton").classList.add("hidden");
            // 显示问题区域和按钮 (它们本来就可见，但以防之前隐藏)
            document.querySelector(".content-box").classList.remove("hidden");
            document.querySelector(".btn-container").classList.remove("hidden");

            askNext();
        }

        // 选择下一个最佳问题
        function askNext() {
            if (candidates.length <= 1) {
                showResult();
                return;
            }

            let best = null;
            let bestScore = 0;

            for (let q of questions) {
                if (askedQuestions.includes(q.key)) continue;

                let yes = 0, no = 0;
                for (let b of candidates) {
                    if (evaluate(b, q.key)) yes++;
                    else no++;
                }

                if (yes === 0 || no === 0) continue;  // 无效问题

                let score = Math.min(yes, no);
                if (score > bestScore) {
                    bestScore = score;
                    best = q;
                }
            }

            if (!best) {
                showResult();
                return;
            }

            currentQuestion = best;
            askedQuestions.push(best.key);
            document.getElementById("questionContainer").innerText = best.text;
        }

        // 判断方块是否满足某个属性 (支持冒号分割的字段:值)
        function evaluate(block, key) {
            if (key.includes(":")) {
                let [field, value] = key.split(":");
                return block[field] === value;
            }
            return !!block[key];
        }

        // 处理用户回答 (true=是, false=否)
        function answer(value) {
            candidates = candidates.filter(b => evaluate(b, currentQuestion.key) === value);
            askNext();
        }

        // 显示最终结果 (采用 V1.1 的结果布局)
        function showResult() {
            // 隐藏问题区域和按钮
            document.querySelector(".content-box").classList.add("hidden");
            document.querySelector(".btn-container").classList.add("hidden");

            const resultDiv = document.getElementById("result");
            resultDiv.innerHTML = "";  // 清空旧内容

            // 创建标题和内容元素 (符合 V1.1 样式)
            const titleEl = document.createElement("div");
            titleEl.className = "result-title";
            const contentEl = document.createElement("div");
            contentEl.className = "result-content";

            if (candidates.length === 1) {
                titleEl.textContent = "你想的方块是：";
                contentEl.innerHTML = `<strong>${candidates[0].name}</strong>`;
            } else if (candidates.length > 1) {
                titleEl.textContent = "可能是以下方块之一：";
                contentEl.innerHTML = candidates.map(b => b.name).join("、");
            } else {
                titleEl.textContent = "数据库中没有匹配方块";
            }

            resultDiv.appendChild(titleEl);
            if (candidates.length > 0) {
                resultDiv.appendChild(contentEl);
            }

            resultDiv.classList.remove("hidden");

            // 显示重启按钮 (预先存在的 #restartButton)
            const restartBtn = document.getElementById("restartButton");
            restartBtn.classList.remove("hidden");
        }

        // 重启游戏 (刷新页面，与V2一致)
        function restart() {
            location.reload();
        }

        // 页面加载时启动
        window.onload = loadData;
    </script>
</body>
</html>
