<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>范式读谱四面4K练习</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        :root {
            --bg: #0b0e14;
            --panel: #11161f;
            --panel-2: #0f151c;
            --border: #2a3440;
            --border-strong: #3a4a5e;
            --text: #e7eef8;
            --muted: #8ca1bf;
            --muted-2: #b7c9e2;
            --primary: #5b8cff;
            --primary-2: #3f6ef0;
            --danger: #f28b82;
            --perfect: #ffd966;
            --good: #6ea8fe;
            --miss: #f28b82;
            --shadow: rgba(7, 12, 20, 0.38);
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            padding: 16px;
            color: var(--text);
            overflow-x: hidden;
        }
        .game-container {
            max-width: 1200px;
            width: 100%;
            padding: 16px 20px 20px;
        }
        .settings-panel {
            display: grid;
            grid-template-columns: repeat(12, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 20px;
            background: linear-gradient(180deg, rgba(19, 25, 36, 0.95), rgba(14, 19, 28, 0.98));
            padding: 16px;
            border-radius: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 16px 36px var(--shadow);
        }
        .param-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
            padding: 14px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(110, 140, 190, 0.18);
            border-radius: 20px;
            min-height: 100%;
        }
        .param-group.span-2 {
            grid-column: span 2;
        }
        .param-group.span-3 {
            grid-column: span 3;
        }
        .param-group.span-4 {
            grid-column: span 4;
        }
        .param-group.span-5 {
            grid-column: span 5;
        }
        .param-group.span-6 {
            grid-column: span 6;
        }
        .param-group.span-12 {
            grid-column: 1 / -1;
        }
        .param-group.compact {
            justify-content: center;
        }
        .param-group.actions {
            justify-content: flex-end;
        }
        .param-group.checkboxes {
            justify-content: center;
            gap: 14px;
        }
        .param-label-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }
        .param-group label {
            color: var(--muted-2);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .param-meta {
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 600;
        }
        .param-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            flex-wrap: wrap;
        }
        .param-row input[type="range"] {
            flex: 1 1 180px;
            min-width: 120px;
            height: 6px;
            margin: 0;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(91, 140, 255, 0.28), rgba(91, 140, 255, 0.10));
            -webkit-appearance: none;
            appearance: none;
        }
        .param-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #dfe9ff;
            border: 3px solid var(--primary);
            cursor: pointer;
        }
        .param-row input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #dfe9ff;
            border: 3px solid var(--primary);
            cursor: pointer;
        }
        .param-row input[type="number"],
        select,
        .custom-input {
            background: var(--panel-2);
            border: 1px solid var(--border-strong);
            color: var(--text);
            border-radius: 14px;
            padding: 9px 12px;
            font-weight: 600;
            font-size: 0.94rem;
        }
        .param-row input[type="number"] {
            width: 88px;
            text-align: center;
        }
        .readonly-box {
            display: inline-flex;
            align-items: center;
            min-height: 42px;
            background: var(--panel-2);
            border: 1px solid var(--border-strong);
            border-radius: 14px;
            padding: 8px 14px;
            color: #b0d0ff;
            font-weight: 700;
            font-size: 1rem;
        }
        .steppers,
        .speed-steps {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .step-btn {
            min-width: 40px;
            height: 36px;
            padding: 0 10px;
            border-radius: 12px;
            border: 1px solid #4a627a;
            background: #243141;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        .speed-steps .step-btn {
            min-width: 56px;
            height: 34px;
            padding: 0 8px;
            font-size: 0.84rem;
            border-radius: 10px;
        }
        .btn {
            background: #29384a;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid #5f7f9f;
            box-shadow: 0 4px 0 #0f151c;
            transition: transform 0.12s ease;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0f151c;
        }
        .btn-primary {
            background: var(--primary-2);
            border-color: #8aadff;
            box-shadow: 0 4px 0 #1e3a9e;
        }
        .btn-warning {
            background: #4e3a5e;
            border-color: #b392d6;
        }
        .btn-danger {
            background: #c0392b;
            border-color: #ff9a8a;
            box-shadow: 0 4px 0 #7a1f17;
        }
        .btn:disabled,
        .step-btn:disabled,
        select:disabled,
        input:disabled {
            opacity: 0.45;
            box-shadow: none;
            pointer-events: none;
            filter: grayscale(0.5);
        }
        .field-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .pattern-section {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
            background: #11161f;
            padding: 12px 20px;
            border-radius: 22px;
            border: 1px solid #2a3440;
            margin: 10px 0;
        }
        .custom-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .error-message {
            color: var(--danger);
            font-size: 0.8rem;
            margin-left: 8px;
        }
        .syntax-hint {
            color: #7f95b5;
            font-size: 0.75rem;
            margin-left: 10px;
            line-height: 1.5;
        }
        .syntax-line {
            display: block;
        }
        .space-hint {
            text-align: center;
            color: #7f95b5;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .btn-start-large {
            padding: 12px 60px;
            font-size: 1.4rem;
            min-width: 240px;
            border-radius: 60px;
        }
        .stats-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 8px 10px 12px;
            gap: 12px;
        }
        .counters {
            display: flex;
            gap: 24px;
            font-size: 1.2rem;
            font-weight: 600;
            flex-wrap: wrap;
        }
        .counter-item {
            display: flex;
            gap: 6px;
        }
        .counter-perfect {
            color: var(--perfect);
        }
        .counter-good {
            color: var(--good);
        }
        .counter-miss {
            color: var(--miss);
        }
        .canvas-wrapper {
            position: relative;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid #2e405b;
            touch-action: none;
            box-shadow: 0 20px 42px rgba(0, 0, 0, 0.28);
            background: #0c0f15;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
            background: #0c0f15;
            touch-action: none;
        }
        .countdown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            font-size: 8rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.92);
            z-index: 10;
        }
        .acc-display {
            position: absolute;
            top: 12px;
            right: 16px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            z-index: 5;
            background: rgba(0, 0, 0, 0.45);
            padding: 3px 12px;
            border-radius: 30px;
            pointer-events: none;
        }

        .btn-ghost {
            background: rgba(20, 28, 42, 0.88);
            border-color: #60748e;
            box-shadow: none;
        }
        .start-row {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 0 8px;
            min-height: 56px;
        }
        .start-row-actions {
            position: absolute;
            right: 0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* 复选框样式 */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--muted-2);
            white-space: nowrap;
            padding: 6px 10px;
            border-radius: 10px;
            transition: background 0.15s;
            letter-spacing: 0.03em;
        }
        .checkbox-label:hover {
            background: rgba(255, 255, 255, 0.04);
        }
        .checkbox-label input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #5f7f9f;
            border-radius: 6px;
            background: var(--panel-2);
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: all 0.18s;
        }
        .checkbox-label input[type="checkbox"]:checked {
            background: var(--primary-2);
            border-color: #8aadff;
        }
        .checkbox-label input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid #fff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .checkbox-label input[type="checkbox"]:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .fullscreen-hud {
            display: none;
            position: absolute;
            top: env(safe-area-inset-top, 0px);
            left: 0;
            width: 100%;
            z-index: 20;
            pointer-events: none;
            padding: 12px 14px;
            color: white;
        }
        .fullscreen-hud-left,
        .fullscreen-hud-right {
            position: absolute;
            top: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(180, 205, 235, 0.18);
            border-radius: 18px;
            padding: 8px 12px;
            font-weight: 700;
            backdrop-filter: blur(6px);
        }
        .fullscreen-hud-left {
            left: 14px;
        }
        .fullscreen-hud-right {
            right: 14px;
        }
        .fullscreen-hud .btn {
            pointer-events: auto;
            padding: 7px 14px;
            font-size: 0.9rem;
        }
        body.fullscreen-mode {
            padding: 0;
            overflow: hidden;
            background: #0c0f15;
        }
        body.fullscreen-mode .game-container {
            max-width: none;
            width: 100vw;
            height: 100vh;
            padding: 0;
            display: block;
        }
        body.fullscreen-mode .settings-panel,
        body.fullscreen-mode .pattern-section,
        body.fullscreen-mode .space-hint,
        body.fullscreen-mode .start-row,
        body.fullscreen-mode .stats-area,
        body.fullscreen-mode .acc-display {
            display: none;
        }
        body.fullscreen-mode .canvas-wrapper {
            width: 100vw;
            height: 100vh;
            border: none;
            border-radius: 0;
            box-shadow: none;
        }
        body.fullscreen-mode #gameCanvas {
            width: 100vw;
            height: 100vh;
        }
        body.fullscreen-mode .fullscreen-hud {
            display: block;
        }

        @media (max-width: 1080px) {
            .param-group.span-2,
            .param-group.span-3,
            .param-group.span-4,
            .param-group.span-5,
            .param-group.span-6 {
                grid-column: span 6;
            }
            .param-group.actions {
                grid-column: 1 / -1;
            }
            .param-group.checkboxes {
                grid-column: 1 / -1;
            }
        }
        @media (max-width: 720px) {
            body {
                padding: 10px;
            }
            .game-container {
                padding: 10px 0 18px;
            }
            .settings-panel {
                grid-template-columns: 1fr;
                padding: 12px;
                gap: 12px;
                border-radius: 22px;
            }
            .param-group,
            .param-group.span-2,
            .param-group.span-3,
            .param-group.span-4,
            .param-group.span-5,
            .param-group.span-6,
            .param-group.span-12 {
                grid-column: 1 / -1;
            }
            .param-row input[type="number"] {
                width: 100%;
            }
            .param-row input[type="range"] {
                flex-basis: 100%;
            }
            .speed-steps {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                width: 100%;
            }
            .speed-steps .step-btn {
                width: 100%;
                min-width: 0;
            }
            .pattern-section {
                padding: 12px;
                border-radius: 18px;
            }
            .btn-start-large {
                padding: 12px 30px;
                font-size: 1.2rem;
            }
            .counters {
                gap: 16px;
                font-size: 1rem;
            }
            .stats-area {
                align-items: flex-start;
            }
            .countdown-overlay {
                font-size: 5rem;
            }
            .checkbox-label {
                font-size: 0.78rem;
                padding: 5px 8px;
            }

            .start-row {
                justify-content: stretch;
                flex-direction: column;
                gap: 10px;
            }
            .start-row-actions {
                position: static;
                width: 100%;
                justify-content: center;
            }
            .fullscreen-hud-left,
            .fullscreen-hud-right {
                top: 8px;
                padding: 6px 8px;
                gap: 8px;
                font-size: 0.82rem;
            }
            .fullscreen-hud-left {
                left: 8px;
            }
            .fullscreen-hud-right {
                right: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="gameContainer">
        <div class="settings-panel" id="settingsPanel">
            <div class="param-group span-3">
                <div class="param-label-row"><label>BPM</label></div>
                <div class="param-row">
                    <input type="range" id="bpmSlider" min="30" max="600" value="90">
                    <input type="number" id="bpmInput" min="30" max="600" value="90">
                    <div class="steppers">
                        <button class="step-btn" id="bpmDec">−</button>
                        <button class="step-btn" id="bpmInc">+</button>
                    </div>
                </div>
            </div>

            <div class="param-group span-2 compact">
                <div class="param-label-row"><label>节奏</label></div>
                <select id="rhythmSelect">
                    <option value="4" selected>四分</option>
                    <option value="8">八分</option>
                    <option value="12">十二分</option>
                    <option value="16">十六分</option>
                </select>
            </div>

            <div class="param-group span-5">
                <div class="param-label-row">
                    <label>流速</label>
                    <span class="param-meta" id="speedMsDisplay">到达判定边时间：10000 ms</span>
                </div>
                <div class="field-stack">
                    <div class="param-row">
                        <input type="range" id="speedSlider" min="1" max="10" step="0.01" value="6.00">
                        <input type="number" id="speedInput" min="1" max="10" step="0.01" value="6.00">
                    </div>
                    <div class="speed-steps">
                        <button class="step-btn" data-step="-0.01">-0.01</button>
                        <button class="step-btn" data-step="-0.1">-0.1</button>
                        <button class="step-btn" data-step="-1">-1</button>
                        <button class="step-btn" data-step="1">+1</button>
                        <button class="step-btn" data-step="0.1">+0.1</button>
                        <button class="step-btn" data-step="0.01">+0.01</button>
                    </div>
                </div>
            </div>

            <div class="param-group span-2 compact">
                <div class="param-label-row"><label>模式</label></div>
                <div class="param-row"><span class="readonly-box">四面 × 4K</span></div>
            </div>

            <div class="param-group span-3">
                <div class="param-label-row"><label>Perfect判定范围 ±ms</label></div>
                <div class="param-row">
                    <input type="range" id="perfectSlider" min="10" max="200" value="80">
                    <input type="number" id="perfectInput" min="10" max="200" value="80">
                    <div class="steppers">
                        <button class="step-btn" id="perfectDec">−</button>
                        <button class="step-btn" id="perfectInc">+</button>
                    </div>
                </div>
            </div>

            <div class="param-group span-2 compact">
                <div class="param-label-row"><label>Good判定范围 ±ms</label></div>
                <div class="param-row"><span class="readonly-box" id="goodDisplay">160</span></div>
            </div>

            <div class="param-group span-3">
                <div class="param-label-row">
                    <label>音符 / 轨道显示大小</label>
                    <span class="param-meta">只影响显示，不影响扇形判定逻辑</span>
                </div>
                <div class="param-row">
                    <input type="range" id="noteSizeSlider" min="24" max="96" value="52">
                    <input type="number" id="noteSizeInput" min="24" max="96" value="52">
                    <div class="steppers">
                        <button class="step-btn" id="noteSizeDec">−</button>
                        <button class="step-btn" id="noteSizeInc">+</button>
                    </div>
                </div>
            </div>

            <div class="param-group span-2 actions compact">
                <div class="param-label-row"><label>操作</label></div>
                <div class="param-row"><button class="btn btn-warning" id="resetBtn">重置</button></div>
            </div>

            <div class="param-group span-4 checkboxes">
                <div class="param-label-row"><label>显示选项</label></div>
                <div class="param-row" style="gap:16px; flex-wrap:wrap;">
                    <label class="checkbox-label">
                        <input type="checkbox" id="hideHitZones" checked> 隐藏判定区域
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="hideTrackLines"> 隐藏轨道分割线
                    </label>
                </div>
            </div>
        </div>

        <div class="pattern-section">
            <label style="color:#b7c9e2; font-weight:600;">键型</label>
            <select id="patternCategory" style="min-width:130px;"></select>
            <select id="patternSub" style="min-width:210px;"></select>
            <div class="custom-row" id="customRow" style="display:none;">
                <input type="text" id="customPatternInput" placeholder="例如：32 (11 22 0) 1* /1 //" style="width:320px;" class="custom-input">
                <span id="patternError" class="error-message"></span>
            </div>
            <div id="syntaxHintBox" class="syntax-hint">
                <span class="syntax-line"><strong>自定义语法：</strong>两个字符一个音符：第1位方向 1上/2右/3下/4左；第2位轨道 1-4。</span>
                <span class="syntax-line"><strong>多押：</strong>括号内同一拍出现，例如 (11 22 33)，不允许嵌套；0 是空拍/占位符。</span>
                <span class="syntax-line"><strong>通配：</strong>* 随机可重复，/ 随机且不同于上一个有效音符对应维度；例如 1*、*1、**、1/、/1、//。</span>
            </div>
        </div>

        <div class="space-hint">点击/触摸四周判定区域击打；已移除键盘段逻辑，避免四面输入混乱</div>
        <div class="start-row">
            <button class="btn btn-primary btn-start-large" id="startStopBtn">开始</button>
            <div class="start-row-actions">
                <button class="btn btn-ghost" id="fullscreenBtn">全屏游玩</button>
            </div>
        </div>

        <div class="stats-area">
            <div class="counters">
                <div class="counter-item"><span style="color:#b7c9e2;">Perfect:</span> <span class="counter-perfect" id="perfectCount">0</span></div>
                <div class="counter-item"><span style="color:#b7c9e2;">Good:</span> <span class="counter-good" id="goodCount">0</span></div>
                <div class="counter-item"><span style="color:#b7c9e2;">Miss:</span> <span class="counter-miss" id="missCount">0</span></div>
            </div>
            <div></div>
        </div>

        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="gameCanvas"></canvas>
            <div id="countdownDisplay" class="countdown-overlay" style="display:none;"></div>
            <div id="accDisplay" class="acc-display">Acc: 100.00%</div>
            <div class="fullscreen-hud" id="fullscreenHud">
                <div class="fullscreen-hud-left">
                    <span>P:<span class="counter-perfect" id="fsPerfectCount">0</span></span>
                    <span>G:<span class="counter-good" id="fsGoodCount">0</span></span>
                    <span>M:<span class="counter-miss" id="fsMissCount">0</span></span>
                </div>
                <div class="fullscreen-hud-right">
                    <span id="fsAccDisplay">Acc: 100.00%</span>
                    <button class="btn btn-ghost" id="exitFullscreenBtn">退出全屏</button>
                </div>
            </div>
        </div>
    </div>


    <script>
        (function() {
            "use strict";

            const gameContainer = document.getElementById('gameContainer');

            function clamp(value, min, max) {
                return Math.min(max, Math.max(min, value));
            }

            function roundToStep(value, step, decimals) {
                const rounded = Math.round(value / step) * step;
                return Number(rounded.toFixed(decimals));
            }

            function uToMs(u) {
                return 10000 * Math.exp(-0.5117 * (u - 1));
            }

            function normalizeSpeedU(v) {
                return roundToStep(clamp(Number(v) || SPEED_DEFAULT_U, SPEED_MIN_U, SPEED_MAX_U), 0.01, 2);
            }

            function bindNumberControl(slider, input, dec, inc, onChange) {
                const min = () => Number(slider.min);

                function applyValue(value) {
                    value = clamp(Number(value), min(), max());
                    slider.value = value;
                    input.value = value;
                    if (onChange) onChange(value);
                    updateGoodDisplay();
                    saveSettings();
                    requestStaticDraw();

                slider.addEventListener('input', () => applyValue(slider.value));
                input.addEventListener('change', () => {
                    let value = Number(input.value);
                    if (Number.isNaN(value)) value = min();
                    applyValue(value);
                });
                dec.addEventListener('click', () => applyValue(Number(slider.value) - step()));
                inc.addEventListener('click', () => applyValue(Number(slider.value) + step()));
            }

            function updateSubOptions(preferredSubIdx = 0, skipSave = true) {

            function applyBuiltinPattern(cat, subIdx) {

            function optionExists(select, value) {

            function restorePatternSelection(savedSettings) {

            function isTokenChar(ch) {
                return /^[1-4*/]$/.test(ch);
            }

            function parseBeatContent(str, insideGroup) {
                const items = [];
                let i = 0;

                while (i < str.length) {
                    const ch = str[i];
                    if (/\s|,|，|;|；|\|/.test(ch)) {
                        i++;
                        continue;
                    }

                    if (ch === '0') {
                        items.push({ type: 'placeholder' });
                        i++;
                        continue;
                    }

                    if (!isTokenChar(ch)) return { error: `非法字符 ${ch}` };
                    if (i + 1 >= str.length) return { error: '音符必须两个字符一组' };

                    const ch2 = str[i + 1];
                    if (!isTokenChar(ch2)) return { error: `音符 ${ch}${ch2 || ''} 不完整或含非法字符` };

                    items.push({ type: 'note', directionToken: ch, laneToken: ch2 });
                    i += 2;
                }

                if (!insideGroup && items.length > 1) return { error: '内部错误：非括号内容不应含多个音符' };
                return { items };
            }

            function parseCustomPattern(str) {
                const raw = str.trim();
                if (!raw) return { error: '输入为空' };

                const beats = [];
                let i = 0;

                while (i < raw.length) {
                    const ch = raw[i];

                    if (/\s|,|，|;|；|\|/.test(ch)) {
                        i++;
                        continue;
                    }

                    if (ch === '(') {
                        let depth = 1;
                        let j = i + 1;
                        let content = '';

                        while (j < raw.length && depth > 0) {
                            const cj = raw[j];
                            if (cj === '(') return { error: '不允许嵌套括号' };
                            if (cj === ')') {
                                depth--;
                                if (depth === 0) break;
                            } else {
                                content += cj;
                            }
                            j++;
                        }

                        if (depth !== 0) return { error: '括号没有闭合' };
                        const parsed = parseBeatContent(content, true);
                        if (parsed.error) return parsed;
                        beats.push({ type: 'beat', specs: parsed.items.filter(item => item.type === 'note') });
                        i = j + 1;
                        continue;
                    }

                    if (ch === ')') return { error: '多余的右括号' };

                    if (ch === '0') {
                        beats.push({ type: 'beat', specs: [] });
                        i++;
                        continue;
                    }

                    if (!isTokenChar(ch)) return { error: `非法字符 ${ch}` };
                    if (i + 1 >= raw.length) return { error: '音符必须两个字符一组' };

                    const ch2 = raw[i + 1];
                    if (!isTokenChar(ch2)) return { error: `音符 ${ch}${ch2 || ''} 不完整或含非法字符` };

                    beats.push({ type: 'beat', specs: [{ type: 'note', directionToken: ch, laneToken: ch2 }] });
                    i += 2;
                }

                if (!beats.length) return { error: '没有有效拍' };
                return { beats };
            }

            function parseAndApplyCustom(skipSave = false) {
                const parsed = parseCustomPattern(customPatternInput.value);
                if (parsed.error) {
                    patternError.textContent = parsed.error;
                    customValid = false;
                    return false;
                }
                patternError.textContent = '';
                customValid = true;
                currentPattern = { type: 'custom', beats: parsed.beats, index: 0, prevCell: null };
                if (!skipSave) saveSettings();
                return true;
            }

            function cellKey(cell) {
                return `${cell.direction}-${cell.lane}`;
            }

            function randomInt1to4(excludeValue) {
                const candidates = [1, 2, 3, 4].filter(v => excludeValue ? v !== excludeValue : true);
                return candidates[Math.floor(Math.random() * candidates.length)];
            }

            function getRandomCell(excludeKeys = new Set()) {
                const candidates = [];
                for (let direction = 1; direction <= 4; direction++) {
                    for (let lane = 1; lane <= 4; lane++) {
                        const cell = { direction, lane };
                        if (!excludeKeys.has(cellKey(cell))) candidates.push(cell);
                    }
                }
                return candidates[Math.floor(Math.random() * candidates.length)];
            }

            function resolveToken(token, dimension, prevCell) {
                if (token === '*') return randomInt1to4(null);
                if (token === '/') {
                    if (!prevCell) return randomInt1to4(null);
                    return randomInt1to4(dimension === 'direction' ? prevCell.direction : prevCell.lane);
                }
                return Number(token);
            }

            function resolveSpec(spec, prevCell, usedKeys) {
                const hasWildcard = spec.directionToken === '*' || spec.directionToken === '/' || spec.laneToken === '*' ||
                    spec.laneToken === '/';
                let chosen = null;

                for (let tries = 0; tries < 40; tries++) {
                    const direction = resolveToken(spec.directionToken, 'direction', prevCell);
                    const lane = resolveToken(spec.laneToken, 'lane', prevCell);
                    chosen = { direction, lane };

                    if (!usedKeys.has(cellKey(chosen))) return chosen;
                    if (!hasWildcard) return null;
                }

                for (let direction = 1; direction <= 4; direction++) {
                    for (let lane = 1; lane <= 4; lane++) {
                        const fallback = { direction, lane };
                        if (!usedKeys.has(cellKey(fallback))) return fallback;
                    }
                }
                return null;
            }

            function getNextCells() {
                if (!currentPattern) return [getRandomCell()];

                if (currentPattern.type === 'random') {
                    const first = getRandomCell();
                    const cells = [first];
                    if (Math.random() < DOUBLE_CHANCE_RANDOM) {
                        const exclude = new Set([cellKey(first)]);
                        cells.push(getRandomCell(exclude));
                    }
                    currentPattern.prevCell = cells[cells.length - 1];
                    return cells;
                }

                if (currentPattern.type === 'builtin') {
                    const beat = currentPattern.sequence[currentPattern.index % currentPattern.sequence.length] || [];
                    currentPattern.index = (currentPattern.index + 1) % currentPattern.sequence.length;
                    const used = new Set();
                    const cells = [];
                    for (const cell of beat) {
                        const key = cellKey(cell);
                        if (used.has(key)) continue;
                        used.add(key);
                        const copy = { direction: cell.direction, lane: cell.lane };
                        cells.push(copy);
                        currentPattern.prevCell = copy;
                    }
                    return cells;
                }

                if (currentPattern.type === 'custom') {
                    if (patternCategory.value === '__custom__' && !customValid) return [getRandomCell()];
                    const beat = currentPattern.beats[currentPattern.index % currentPattern.beats.length];
                    currentPattern.index = (currentPattern.index + 1) % currentPattern.beats.length;
                    const used = new Set();
                    const cells = [];
                    for (const spec of beat.specs) {
                        const cell = resolveSpec(spec, currentPattern.prevCell, used);
                        if (!cell) continue;
                        used.add(cellKey(cell));
                        cells.push(cell);
                        currentPattern.prevCell = cell;
                    }
                    return cells;
                }

                return [getRandomCell()];
            }

            function resetPatternIndex() {
                if (currentPattern) {
                    if (typeof currentPattern.index === 'number') currentPattern.index = 0;

                if (total > 0) accValue = (perfectCount + goodCount * 0.7) / total * 100;

            function isFullscreenMode() {
                return Boolean(document.fullscreenElement) || document.body.classList.contains('fullscreen-mode');
            }

            function resizeCanvas() {
                const fullscreen = isFullscreenMode();
                canvasCssWidth = fullscreen ? window.innerWidth : canvasWrapper.clientWidth;
                canvasCssHeight = fullscreen ? window.innerHeight : Math.max(window.innerHeight * 0.72, 460);
                dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

                canvas.style.width = `${canvasCssWidth}px`;
                canvas.style.height = `${canvasCssHeight}px`;
                canvas.width = Math.round(canvasCssWidth * dpr);
                canvas.height = Math.round(canvasCssHeight * dpr);
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                updateLayout();
            }

            function updateLayout() {
                const displaySize = Number(noteSizeSlider.value);
                const margin = displaySize * 1.65 + 28;
                const maxFieldW = Math.max(220, canvasCssWidth - margin * 2);
                const maxFieldH = Math.max(220, canvasCssHeight - margin * 2);
                const fieldSize = Math.max(220, Math.min(maxFieldW, maxFieldH, isFullscreenMode() ? 900 : 660));
                const cx = canvasCssWidth / 2;
                const cy = canvasCssHeight / 2;
                const half = fieldSize / 2;
                const laneLength = fieldSize / LANES_PER_SIDE;

                layout = {
                    cx,
                    cy,
                    fieldSize,
                    half,
                    left: cx - half,
                    right: cx + half,
                    top: cy - half,
                    bottom: cy + half,
                    laneLength,
                    displaySize,
                    noteThickness: Math.max(10, displaySize * 0.30)
                };
            }

            function scaleFromCenter(point, ratio) {
                return {
                    x: layout.cx + (point.x - layout.cx) * ratio,
                    y: layout.cy + (point.y - layout.cy) * ratio
                };
            }

            function getSegmentEndpoints(direction, lane) {
                const l = layout;
                const i = lane - 1;

                if (direction === 1) {
                    return [
                        { x: l.left + i * l.laneLength, y: l.top },
                        { x: l.left + (i + 1) * l.laneLength, y: l.top }
                    ];
                }
                if (direction === 2) {
                    return [
                        { x: l.right, y: l.top + i * l.laneLength },
                        { x: l.right, y: l.top + (i + 1) * l.laneLength }
                    ];
                }
                if (direction === 3) {
                    return [
                        { x: l.left + (i + 1) * l.laneLength, y: l.bottom },
                        { x: l.left + i * l.laneLength, y: l.bottom }
                    ];
                }
                return [
                    { x: l.left, y: l.top + (i + 1) * l.laneLength },
                    { x: l.left, y: l.top + i * l.laneLength }
                ];
            }

            function getWedgePolygon(direction, lane) {
                const [a, b] = getSegmentEndpoints(direction, lane);
                return [
                    scaleFromCenter(a, HIT_INNER_RATIO),
                    scaleFromCenter(b, HIT_INNER_RATIO),
                    scaleFromCenter(b, HIT_OUTER_RATIO),
                    scaleFromCenter(a, HIT_OUTER_RATIO)
                ];
            }

            function getTargetPosition(direction, lane) {
                const [a, b] = getSegmentEndpoints(direction, lane);
                return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
            }

            function pointInPolygon(point, polygon) {
                let inside = false;
                for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                    const xi = polygon[i].x,
                        yi = polygon[i].y;
                    const xj = polygon[j].x,
                        yj = polygon[j].y;
                    const intersect = ((yi > point.y) !== (yj > point.y)) &&
                        (point.x < (xj - xi) * (point.y - yi) / ((yj - yi) || 0.000001) + xi);
                    if (intersect) inside = !inside;
                }
                return inside;
            }

            function distanceSq(a, b) {
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                return dx * dx + dy * dy;
            }

            function getZoneFromPoint(x, y) {
                if (!layout) return null;
                const point = { x, y };
                const candidates = [];

                for (let direction = 1; direction <= 4; direction++) {
                    for (let lane = 1; lane <= 4; lane++) {
                        const poly = getWedgePolygon(direction, lane);
                        if (pointInPolygon(point, poly)) {
                            candidates.push({ direction, lane, d: distanceSq(point, getTargetPosition(direction,
                            lane)) });
                        }
                    }
                }

                if (!candidates.length) return null;
                candidates.sort((a, b) => a.d - b.d);
                return { direction: candidates[0].direction, lane: candidates[0].lane };
            }

            function bindEvents() {
                bindNumberControl(bpmSlider, bpmInput, bpmDec, bpmInc, updateNoteInterval);
                bindNumberControl(perfectSlider, perfectInput, perfectDec, perfectInc, updateGoodDisplay);
                bindNumberControl(noteSizeSlider, noteSizeInput, noteSizeDec, noteSizeInc, () => updateLayout());

                speedSlider.addEventListener('input', () => setSpeedU(speedSlider.value));
                speedInput.addEventListener('change', () => setSpeedU(speedInput.value));
                speedStepBtns.forEach(btn => btn.addEventListener('click', () => adjustSpeedU(Number(btn.dataset.step))));

                rhythmSelect.addEventListener('change', () => {
                    updateNoteInterval();
                    saveSettings();
                });

                resetBtn.addEventListener('click', () => {
                    if (gameActive) return;
                    if (!resetConfirmActive) {
                        enterResetConfirmState();
                        return;
                    }
                    clearResetConfirmState();
                    resetToDefaults();
                    requestStaticDraw();
                });

                startStopBtn.addEventListener('click', () => gameActive ? stopGame() : startGame());
                fullscreenBtn.addEventListener('click', enterFullscreenPlay);
                exitFullscreenBtn.addEventListener('click', exitFullscreenPlay);

                document.addEventListener('fullscreenchange', () => {
                    const on = Boolean(document.fullscreenElement);
                    document.body.classList.toggle('fullscreen-mode', on);
                    resizeCanvas();
                    drawCanvas(performance.now());
                });

                patternCategory.addEventListener('change', () => {
                    updateSubOptions(0, false);
                    saveSettings();
                });

                patternSub.addEventListener('change', () => {
                    if (patternCategory.value !== '__custom__') {
                        applyBuiltinPattern(patternCategory.value, Number(patternSub.value));
                        saveSettings();
                    }
                });

                customPatternInput.addEventListener('input', () => {
                    if (patternCategory.value === '__custom__') parseAndApplyCustom();
                });

                hideHitZonesCheckbox.addEventListener('change', () => {
                    saveSettings();
                    requestStaticDraw();
                });

                hideTrackLinesCheckbox.addEventListener('change', () => {
                    saveSettings();
                    requestStaticDraw();
                });

                canvas.addEventListener('pointerdown', e => {
                    e.preventDefault();
                    if (!gameActive || !acceptingInput) return;
                    const rect = canvas.getBoundingClientRect();
                    const x = (e.clientX - rect.left) * (canvasCssWidth / rect.width);
                    const y = (e.clientY - rect.top) * (canvasCssHeight / rect.height);
                    const zone = getZoneFromPoint(x, y);
                    if (zone) handleHit(zone.direction, zone.lane);
                }, { passive: false });

                canvas.addEventListener('pointermove', e => e.preventDefault(), { passive: false });

                window.addEventListener('resize', () => {
                    resizeCanvas();
                    requestStaticDraw();
                });
            }

            async function enterFullscreenPlay() {
                clearResetConfirmState();
                try {
                    if (!document.fullscreenElement) await gameContainer.requestFullscreen();
                } catch (e) {
                    document.body.classList.add('fullscreen-mode');
                    resizeCanvas();
                }

                if (!gameActive) startGame();
                else {
                    resizeCanvas();
                    drawCanvas(performance.now());
                }
            }

            async function exitFullscreenPlay() {
                if (document.fullscreenElement) {
                    try { await document.exitFullscreen(); } catch (e) {}
                }
                document.body.classList.remove('fullscreen-mode');
                resizeCanvas();
                drawCanvas(performance.now());
            }

            function resetGameStats() {
                perfectCount = 0;
                goodCount = 0;
                missCount = 0;
                updateStatsSpans();
                updateAccDisplay();
                notes = [];
                effects = [];
                resetPatternIndex();
            }

            function startCountdown() {
                const now = performance.now();
                countdownState = { active: true, phase: 'ready', nextBeatTime: now + 850, beatsLeft: 3 };
                countdownDiv.style.display = 'flex';
                countdownDiv.textContent = '准备';
                acceptingInput = false;
                gameActive = true;
            }

            function updateCountdown(now) {
                if (!countdownState.active) return;
                const s = countdownState;

                if (s.phase === 'ready' && now >= s.nextBeatTime) {
                    s.phase = 'countdown';
                    s.nextBeatTime = now + countdownBeatMs;
                    countdownDiv.textContent = '3';
                } else if (s.phase === 'countdown' && now >= s.nextBeatTime) {
                    s.beatsLeft--;
                    if (s.beatsLeft > 0) {
                        countdownDiv.textContent = String(s.beatsLeft);
                        s.nextBeatTime += countdownBeatMs;
                    } else {
                        countdownState.active = false;
                        countdownDiv.style.display = 'none';
                        acceptingInput = true;
                        nextNoteTime = now;
                    }
                }
            }

            function startGame() {
                if (gameActive) return;
                clearResetConfirmState();

                if (patternCategory.value === '__custom__' && !parseAndApplyCustom(true)) return;

                allControls.forEach(c => c.disabled = true);
                resetGameStats();
                updateNoteInterval();
                resizeCanvas();
                startStopBtn.textContent = '停止';
                startCountdown();

                animFrame = requestAnimationFrame(function loop(ts) {
                    if (!gameActive) return;
                    updateAndDraw(ts);
                    animFrame = requestAnimationFrame(loop);
                });
            }

            function stopGame() {
                if (!gameActive) return;
                gameActive = false;
                acceptingInput = false;
                startStopBtn.textContent = '开始';
                allControls.forEach(c => c.disabled = false);
                if (animFrame) {
                    cancelAnimationFrame(animFrame);
                    animFrame = null;
                }
                notes = [];
                effects = [];
                countdownState.active = false;
                countdownDiv.style.display = 'none';
                requestStaticDraw();
            }

            function generateNotes(now) {
                if (!gameActive || !acceptingInput) return;

                let generated = 0;
                while (nextNoteTime <= now && generated < 40) {
                    const cells = getNextCells();
                    const used = new Set();
                    const filtered = [];

                    for (const cell of cells) {
                        const key = cellKey(cell);
                        if (used.has(key)) continue;
                        used.add(key);
                        filtered.push(cell);
                    }

                    const chordSize = filtered.length;
                    const chordId = chordSerial++;

                    for (const cell of filtered) {
                        notes.push({
                            direction: cell.direction,
                            lane: cell.lane,
                            birthTime: nextNoteTime,
                            hitTime: nextNoteTime + getSpeedMs(),
                            judged: false,
                            chordId,
                            chordSize,
                            glow: chordSize > 1
                        });
                    }

                    nextNoteTime += noteIntervalMs;
                    generated++;
                }
            }

            function handleHit(direction, lane) {
                if (!gameActive || !acceptingInput) return;

                const now = performance.now();
                const pw = Number(perfectSlider.value);
                const gw = pw * 2;
                let bestIndex = -1;
                let bestAbs = Infinity;

                for (let i = 0; i < notes.length; i++) {
                    const n = notes[i];
                    if (n.judged || n.direction !== direction || n.lane !== lane) continue;
                    const abs = Math.abs(now - n.hitTime);
                    if (abs <= gw && abs < bestAbs) {
                        bestAbs = abs;
                        bestIndex = i;
                    }
                }

                if (bestIndex === -1) return;

                const n = notes[bestIndex];
                const target = getTargetPosition(n.direction, n.lane);
                n.judged = true;
                notes.splice(bestIndex, 1);

                if (bestAbs <= pw) {
                    perfectCount++;
                    effects.push({ x: target.x, y: target.y, type: 'perfect', startTime: now });
                } else {
                    goodCount++;
                    effects.push({ x: target.x, y: target.y, type: 'good', startTime: now });
                }
                updateStatsSpans();
                updateAccDisplay();
            }

            function updateAndDraw(ts) {
                if (countdownState.active) updateCountdown(ts);
                generateNotes(ts);

                const gw = Number(perfectSlider.value) * 2;
                for (let i = notes.length - 1; i >= 0; i--) {
                    const n = notes[i];
                    if (!n.judged && ts > n.hitTime + gw) {
                        notes.splice(i, 1);
                        missCount++;
                        updateStatsSpans();
                        updateAccDisplay();
                    }
                }
                drawCanvas(ts);
            }

            function requestStaticDraw() {
                if (!gameActive) {
                    resizeCanvas();
                    drawCanvas(performance.now());
                }
            }

            function fillRoundRect(x, y, w, h, r) {
                const radius = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + w - radius, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
                ctx.lineTo(x + w, y + h - radius);
                ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
                ctx.lineTo(x + radius, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
                ctx.fill();
            }

            function drawBackground() {
                ctx.fillStyle = '#0c0f15';
                ctx.fillRect(0, 0, canvasCssWidth, canvasCssHeight);
            }

            function tracePolygon(poly) {
                ctx.beginPath();
                ctx.moveTo(poly[0].x, poly[0].y);
                for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i].x, poly[i].y);
                ctx.closePath();
            }

            function drawHitWedges() {
                if (hideHitZonesCheckbox.checked) return;
                ctx.lineWidth = 1;
                for (let direction = 1; direction <= 4; direction++) {
                    for (let lane = 1; lane <= 4; lane++) {
                        const poly = getWedgePolygon(direction, lane);
                        tracePolygon(poly);
                        ctx.fillStyle = 'rgba(63,110,240,0.055)';
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(145,170,210,0.16)';
                        ctx.stroke();
                    }
                }
            }

            function drawPlayField() {
                const l = layout;
                drawHitWedges();

                ctx.lineWidth = 2.5;
                ctx.strokeStyle = '#dce9ff';
                ctx.strokeRect(l.left, l.top, l.fieldSize, l.fieldSize);

                if (!hideTrackLinesCheckbox.checked) {
                    ctx.strokeStyle = '#40556f';
                    ctx.lineWidth = 1.1;

                    for (let lane = 1; lane < LANES_PER_SIDE; lane++) {
                        const topPoint = getSegmentEndpoints(1, lane)[1];
                        const rightPoint = getSegmentEndpoints(2, lane)[1];
                        const bottomPoint = getSegmentEndpoints(3, lane)[0];
                        const leftPoint = getSegmentEndpoints(4, lane)[0];

                        ctx.beginPath();
                        ctx.moveTo(l.cx, l.cy);
                        ctx.lineTo(topPoint.x, topPoint.y);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(l.cx, l.cy);
                        ctx.lineTo(rightPoint.x, rightPoint.y);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(l.cx, l.cy);
                        ctx.lineTo(bottomPoint.x, bottomPoint.y);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(l.cx, l.cy);
                        ctx.lineTo(leftPoint.x, leftPoint.y);
                        ctx.stroke();
                    }

                    ctx.strokeStyle = '#2d3d55';
                    ctx.lineWidth = 1;
                    const corners = [
                        { x: l.left, y: l.top }, { x: l.right, y: l.top },
                        { x: l.right, y: l.bottom }, { x: l.left, y: l.bottom }
                    ];
                    for (const c of corners) {
                        ctx.beginPath();
                        ctx.moveTo(l.cx, l.cy);
                        ctx.lineTo(c.x, c.y);
                        ctx.stroke();
                    }
                }
            }

            function drawDirectionLabels() {
                const l = layout;
                const offset = Math.max(28, l.displaySize * 0.88);

                ctx.font = '700 14px "Segoe UI", system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#b7c9e2';
                ctx.fillText('1 上', l.cx, l.top - offset);
                ctx.fillText('3 下', l.cx, l.bottom + offset);

                ctx.save();
                ctx.translate(l.right + offset, l.cy);
                ctx.rotate(Math.PI / 2);
                ctx.fillText('2 右', 0, 0);
                ctx.restore();

                ctx.save();
                ctx.translate(l.left - offset, l.cy);
                ctx.rotate(-Math.PI / 2);
                ctx.fillText('4 左', 0, 0);
                ctx.restore();

                ctx.font = '600 12px "Segoe UI", system-ui, sans-serif';
                ctx.fillStyle = '#7f95b5';

                for (let i = 0; i < LANES_PER_SIDE; i++) {
                    const p = (i + 0.5) * l.laneLength;
                    const lane = i + 1;
                    ctx.fillText(String(lane), l.left + p, l.top + 14);
                    ctx.fillText(String(lane), l.left + p, l.bottom - 14);
                    ctx.fillText(String(lane), l.right - 14, l.top + p);
                    ctx.fillText(String(lane), l.left + 14, l.top + p);
                }
            }

            function drawCenterGuides() {
                const l = layout;
                ctx.strokeStyle = '#263448';
                ctx.lineWidth = 1;
                const guideLen = Math.min(90, l.fieldSize * 0.18);
                ctx.beginPath();
                ctx.moveTo(l.cx - guideLen, l.cy);
                ctx.lineTo(l.cx + guideLen, l.cy);
                ctx.moveTo(l.cx, l.cy - guideLen);
                ctx.lineTo(l.cx, l.cy + guideLen);
                ctx.stroke();

                ctx.fillStyle = '#162033';
                fillRoundRect(l.cx - 16, l.cy - 16, 32, 32, 8);
            }

            function motionEase(t) {
                if (t <= 1) return Math.pow(Math.max(0, t), 1.72);
                return 1 + (t - 1) * 0.42;
            }

            function drawNote(note, now) {
                const l = layout;
                const target = getTargetPosition(note.direction, note.lane);
                const raw = (now - note.birthTime) / getSpeedMs();
                const t = clamp(raw, 0, 1.18);
                const eased = motionEase(t);
                const x = l.cx + (target.x - l.cx) * eased;
                const y = l.cy + (target.y - l.cy) * eased;

                const sizeT = clamp(raw, 0, 1);
                const scale = 0.22 + 0.92 * Math.pow(sizeT, 1.08);
                const baseLength = Math.max(26, l.laneLength * 0.68);
                const baseThick = l.noteThickness;
                const length = baseLength * scale;
                const thick = baseThick * scale;

                ctx.save();
                if (note.glow) {
                    ctx.shadowColor = '#ffd966';
                    ctx.shadowBlur = 22;
                    ctx.fillStyle = '#ffd966';
                } else {
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#3f8cff';
                }

                if (note.direction === 1 || note.direction === 3) {
                    fillRoundRect(x - length / 2, y - thick / 2, length, thick, thick / 2);
                } else {
                    fillRoundRect(x - thick / 2, y - length / 2, thick, length, thick / 2);
                }
                ctx.restore();
            }

            function drawEffects(now) {
                effects = effects.filter(effect => {
                    const age = now - effect.startTime;
                    if (age > EFFECT_DURATION) return false;
                    const p = age / EFFECT_DURATION;
                    ctx.globalAlpha = 1 - p;
                    ctx.strokeStyle = effect.type === 'perfect' ? '#ffd966' : '#6ea8fe';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(effect.x, effect.y, 8 + 16 * p, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                    return true;
                });
            }

            function drawCanvas(now) {
                if (!layout) updateLayout();
                drawBackground();
                drawPlayField();
                drawCenterGuides();

                notes.forEach(note => {
                    if (!note.judged) drawNote(note, now);
                });

                drawEffects(now);
                drawDirectionLabels();
            }

            function init() {
                resizeCanvas();
                loadSettings();
                bindEvents();
                allControls = [
                    bpmSlider, bpmInput, bpmDec, bpmInc,
                    rhythmSelect,
                    speedSlider, speedInput, ...speedStepBtns,
                    perfectSlider, perfectInput, perfectDec, perfectInc,
                    noteSizeSlider, noteSizeInput, noteSizeDec, noteSizeInc,
                    resetBtn,
                    patternCategory, patternSub, customPatternInput
                ];
                resizeCanvas();
                drawCanvas(performance.now());
                updateStatsSpans();
                updateAccDisplay();
            }

            init();
        })();
    </script>
</body>
</html>
