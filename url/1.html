<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bilibili Embed Player</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #202532;
      --text: #f5f7fa;
      --muted: #aab3c5;
      --accent: #4f8cff;
      --border: rgba(255,255,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.25);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body {
      width: 100%;
      min-height: 100%;
    }

    .page {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      width: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .toolbar {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.02);
    }

    .title {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.4;
      font-weight: 700;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 10px;
      min-height: 42px;
    }

    .control label {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    input[type="number"] {
      width: 90px;
      min-height: 32px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 10px;
      padding: 6px 10px;
      outline: none;
      font-size: 14px;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    button.primary {
      background: var(--accent);
      border-color: transparent;
      color: white;
      font-weight: 600;
    }

    button:hover {
      filter: brightness(1.06);
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .player-wrap {
      width: 100%;
      padding: 0;
    }

    .player-shell {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .footer {
      padding: 12px 14px 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      word-break: break-all;
    }

    @media (max-width: 520px) {
      .page { padding: 10px; }
      .toolbar { padding: 12px 12px 8px; }
      .footer { padding: 10px 12px 14px; }
      input[type="number"] { width: 78px; }
      button { padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="toolbar">
        <h1 class="title">B站外链播放器（数字选集）</h1>

        <div class="row">
          <div class="control">
            <label for="partInput">当前 P</label>
            <input id="partInput" type="number" min="1" step="1" value="40" />
          </div>

          <button id="prevBtn" type="button">上一集</button>
          <button id="nextBtn" type="button">下一集</button>
          <button id="goBtn" class="primary" type="button">跳转</button>
        </div>

        <div class="hint">
          固定视频：<span class="mono" id="bvidText"></span><br />
          这里使用 B 站官方外链播放器，通过 <span class="mono">bvid + p</span> 切换分P。
          页面宽度始终占满容器，高度按视频比例自动适应；即使本页被放进另一个 iframe，也会按容器宽度自适应。
        </div>
      </div>

      <div class="player-wrap">
        <div class="player-shell">
          <iframe
            id="playerFrame"
            scrolling="no"
            allowfullscreen="true"
            referrerpolicy="strict-origin-when-cross-origin"
            src=""
          ></iframe>
        </div>
      </div>

      <div class="footer">
        当前播放器地址：<span class="mono" id="playerUrl"></span>
      </div>
    </section>
  </main>

  <script>
    const BVID = "BV1vK4y1P74F";
    const DEFAULT_P = 40;

    const partInput = document.getElementById("partInput");
    const playerFrame = document.getElementById("playerFrame");
    const playerUrl = document.getElementById("playerUrl");
    const bvidText = document.getElementById("bvidText");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const goBtn = document.getElementById("goBtn");

    bvidText.textContent = BVID;

    function getPFromLocation() {
      const url = new URL(window.location.href);
      const p = parseInt(url.searchParams.get("p"), 10);
      if (Number.isFinite(p) && p >= 1) return p;
      return DEFAULT_P;
    }

    function setQueryP(p) {
      const url = new URL(window.location.href);
      url.searchParams.set("p", String(p));
      history.replaceState(null, "", url.toString());
    }

    function buildPlayerUrl(p) {
      const safeP = Math.max(1, parseInt(p, 10) || DEFAULT_P);
      return `https://player.bilibili.com/player.html?isOutside=true&bvid=${encodeURIComponent(BVID)}&p=${safeP}`;
    }

    function render(p) {
      const safeP = Math.max(1, parseInt(p, 10) || DEFAULT_P);
      partInput.value = safeP;
      setQueryP(safeP);

      const url = buildPlayerUrl(safeP);
      playerFrame.src = url;
      playerUrl.textContent = url;
      document.title = `Bilibili Embed - ${BVID} - P${safeP}`;
    }

    function jump() {
      render(partInput.value);
    }

    prevBtn.addEventListener("click", () => {
      const current = Math.max(1, parseInt(partInput.value, 10) || DEFAULT_P);
      render(Math.max(1, current - 1));
    });

    nextBtn.addEventListener("click", () => {
      const current = Math.max(1, parseInt(partInput.value, 10) || DEFAULT_P);
      render(current + 1);
    });

    goBtn.addEventListener("click", jump);

    partInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") jump();
    });

    render(getPFromLocation());
  </script>
</body>
</html>
