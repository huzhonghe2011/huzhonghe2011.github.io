<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>嵌入页面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .panel {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      min-width: 320px;
      max-width: 90vw;
    }

    .panel h3 {
      margin-bottom: 10px;
      font-size: 18px;
      color: #222;
      text-align: center;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input {
      flex: 1;
      min-width: 260px;
      padding: 12px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }

    button {
      padding: 12px 18px;
      font-size: 15px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      background: #0056b3;
    }

    .message {
      margin-top: 10px;
      font-size: 14px;
      color: #d93025;
      display: none;
      line-height: 1.5;
    }

    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="panel" id="panel">
    <h3>输入需要嵌入的链接</h3>
    <div class="row">
      <input type="text" id="urlInput" value="https://" placeholder="输入链接地址">
      <button id="loadBtn">确认</button>
    </div>
    <div class="message" id="message"></div>
  </div>

  <iframe id="iframe" referrerpolicy="no-referrer"></iframe>

  <script>
    const iframe = document.getElementById("iframe");
    const urlInput = document.getElementById("urlInput");
    const message = document.getElementById("message");
    const panel = document.getElementById("panel");
    const loadBtn = document.getElementById("loadBtn");

    const urlParams = new URLSearchParams(window.location.search);
    const urlFromParams = urlParams.get("url");

    function showMessage(text) {
      message.textContent = text;
      message.style.display = "block";
    }

    function hideMessage() {
      message.textContent = "";
      message.style.display = "none";
    }

    function isValidURL(url) {
      try {
        const u = new URL(url);
        return u.protocol === "http:" || u.protocol === "https:";
      } catch {
        return false;
      }
    }

    function openInIframe(url) {
      hideMessage();
      iframe.style.display = "block";
      panel.style.display = "none";
      iframe.src = url;
    }

    function loadURL() {
      const userURL = urlInput.value.trim();
      if (!isValidURL(userURL)) {
        showMessage("请输入有效的 http:// 或 https:// 地址");
        return;
      }
      const newUrl = window.location.pathname + "?url=" + encodeURIComponent(userURL);
      history.replaceState(null, "", newUrl);
      openInIframe(userURL);
    }

    loadBtn.addEventListener("click", loadURL);
    urlInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") loadURL();
    });

    if (urlFromParams) {
      if (isValidURL(urlFromParams)) {
        urlInput.value = urlFromParams;
        openInIframe(urlFromParams);
      } else {
        showMessage("无效的 URL 参数");
      }
    }

    // 同源情况下，尽量把 iframe 内的弹窗和新窗口跳转都改成留在 iframe 中
    iframe.addEventListener("load", () => {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        const win = iframe.contentWindow;

        // 拦截 window.open
        win.open = function(url) {
          if (url) {
            iframe.src = url;
          }
          return null;
        };

        // 重写所有 a[target=_blank]
        doc.querySelectorAll("a").forEach(a => {
          a.setAttribute("target", "_self");
          a.addEventListener("click", function () {
            const href = a.getAttribute("href");
            if (!href) return;
          });
        });

        // 重写 form target
        doc.querySelectorAll("form").forEach(form => {
          form.setAttribute("target", "_self");
        });

      } catch (err) {
        // 跨域会进入这里，前端无法继续干预 iframe 内部行为
        showMessage("当前页面已嵌入，但这是跨域网站，无法强制接管其弹窗、新窗口或内部跳转行为。若要完全控制，必须通过服务端代理重写页面。");
      }
    });

    // 如果 iframe 内页面通过 postMessage 请求外层跳转，可在这里统一改成 iframe 内加载
    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object") return;

      if (data.type === "open-url" && data.url && isValidURL(data.url)) {
        iframe.src = data.url;
      }
    });
  </script>
</body>
</html>
